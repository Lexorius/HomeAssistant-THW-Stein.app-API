                    - position: relative
                    - padding: 16px
                  name:
                    - color: white
                    - font-size: 23px
                  state:
                    - color: white
                    - font-size: 16px
                  custom_fields:
                    hu_days:
                      - position: absolute
                      - right: 10px
                      - bottom: 10px
                      - color: white
                      - font-size: 14px
                      - opacity: 0.9
                    sp_days:
                      - position: absolute
                      - left: 10px
                      - bottom: 10px
                      - color: white
                      - font-size: 14px
                      - opacity: 0.9
                custom_fields:
                  hu_days: |
                    [[[
                      if (entity.attributes.hu_remaining_hours != null) {
                        var days = Math.round(entity.attributes.hu_remaining_hours / 24);
                        if (days < 0) return '⚠️ HU abgelaufen';
                        if (days <= 7) return '🔴 HU: ' + days + 'd';
                        if (days <= 30) return '🟠 HU: ' + days + 'd';
                        if (days <= 60) return '🟡 HU: ' + days + 'd';
                        return 'HU: ' + days + 'd';
                      }
                      return '';
